services:
  - type: web
    name: spring-boot-ai-toolkit
    runtime: image
    repo: https://github.com/beckynayere/Java-Spring-_boot_Starter
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JAVA_OPTS
        value: -Xmx512m
      - key: SPRING_PROFILES_ACTIVE
        value: production
    healthCheckPath: /api/ai/health
    autoDeploy: true
